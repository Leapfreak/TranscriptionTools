name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish TranscriptionTools/TranscriptionTools.vbproj -c Release -o TranscriptionTools/bin/Publish

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.25
        with:
          cuda: '12.4.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'
          use-github-cache: 'false'
          use-local-cache: 'false'

      - name: Clone whisper.cpp
        run: |
          git clone --depth 1 --branch v1.8.4 https://github.com/ggml-org/whisper.cpp.git whisper-src

      - name: Apply patches
        run: |
          Copy-Item -Path "patches/stream.cpp" -Destination "whisper-src/examples/stream/stream.cpp" -Force

      - name: Download SDL2
        run: |
          Invoke-WebRequest -Uri "https://github.com/libsdl-org/SDL/releases/download/release-2.30.11/SDL2-devel-2.30.11-VC.zip" -OutFile "sdl2.zip"
          Expand-Archive -Path "sdl2.zip" -DestinationPath "sdl2-temp" -Force
          $sdlDir = Get-ChildItem -Path "sdl2-temp" -Directory | Select-Object -First 1
          Move-Item -Path $sdlDir.FullName -Destination "SDL2"
          Remove-Item "sdl2.zip" -Force
          Remove-Item "sdl2-temp" -Recurse -Force

      - name: Build whisper.cpp with CUDA
        run: |
          cd whisper-src
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DGGML_CUDA=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DWHISPER_SDL2=ON `
            -DSDL2_DIR="${{ github.workspace }}/SDL2/cmake"
          cmake --build . --config Release

      - name: Collect whisper binaries
        run: |
          New-Item -ItemType Directory -Force -Path "whisper-bin"
          $binDir = "whisper-src/build/bin/Release"
          Copy-Item "$binDir/whisper-cli.exe" "whisper-bin/"
          Copy-Item "$binDir/whisper-stream.exe" "whisper-bin/"
          Copy-Item "$binDir/whisper.dll" "whisper-bin/"
          Copy-Item "$binDir/ggml.dll" "whisper-bin/"
          Copy-Item "$binDir/ggml-base.dll" "whisper-bin/"
          Copy-Item "$binDir/ggml-cpu.dll" "whisper-bin/"
          Copy-Item "$binDir/ggml-cuda.dll" "whisper-bin/"
          Copy-Item "$binDir/SDL2.dll" "whisper-bin/"
          Write-Host "Whisper binaries:"
          Get-ChildItem "whisper-bin"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        run: iscc setup.iss

      - name: Create Zip
        run: |
          Copy-Item -Path "whisper-bin/*" -Destination "TranscriptionTools/bin/Publish/" -Force
          Compress-Archive -Path TranscriptionTools/bin/Publish/* -DestinationPath "Output/TranscriptionTools_${{ github.ref_name }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Output/TranscriptionTools_Setup_*.exe
            Output/TranscriptionTools_${{ github.ref_name }}.zip
