name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish TranscriptionTools/TranscriptionTools.vbproj -c Release -o TranscriptionTools/bin/Publish

      - name: Restore whisper binaries cache
        id: whisper-cache
        uses: actions/cache/restore@v4
        with:
          path: whisper-bin
          key: whisper-v1.8.4-cuda12.4-v2-${{ hashFiles('patches/stream.cpp') }}
          restore-keys: |
            whisper-v1.8.4-cuda12.4-v2-

      - name: Check cache contents
        id: cache-check
        shell: pwsh
        run: |
          if (Test-Path "whisper-bin/whisper-cli.exe") {
            echo "has_binaries=true" >> $env:GITHUB_OUTPUT
            Write-Host "Cache hit - whisper binaries found"
          } else {
            echo "has_binaries=false" >> $env:GITHUB_OUTPUT
            Write-Host "Cache miss - need to build"
          }

      - name: Install CUDA Toolkit
        if: steps.cache-check.outputs.has_binaries != 'true'
        run: |
          $url = "https://developer.download.nvidia.com/compute/cuda/12.4.0/network_installers/cuda_12.4.0_windows_network.exe"
          Invoke-WebRequest -Uri $url -OutFile "cuda_installer.exe"
          Start-Process -FilePath "cuda_installer.exe" -ArgumentList "-s nvcc_12.4 cudart_12.4 cublas_12.4 cublas_dev_12.4 visual_studio_integration_12.4" -Wait -NoNewWindow
          Remove-Item "cuda_installer.exe" -Force
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4"
          echo "CUDA_PATH=$cudaPath" >> $env:GITHUB_ENV
          echo "$cudaPath\bin" >> $env:GITHUB_PATH

      - name: Clone whisper.cpp
        if: steps.cache-check.outputs.has_binaries != 'true'
        run: |
          git clone --depth 1 --branch v1.8.4 https://github.com/ggml-org/whisper.cpp.git whisper-src

      - name: Apply patches
        if: steps.cache-check.outputs.has_binaries != 'true'
        run: |
          Copy-Item -Path "patches/stream.cpp" -Destination "whisper-src/examples/stream/stream.cpp" -Force

      - name: Download SDL2
        if: steps.cache-check.outputs.has_binaries != 'true'
        run: |
          Invoke-WebRequest -Uri "https://github.com/libsdl-org/SDL/releases/download/release-2.30.11/SDL2-devel-2.30.11-VC.zip" -OutFile "sdl2.zip"
          Expand-Archive -Path "sdl2.zip" -DestinationPath "sdl2-temp" -Force
          $sdlDir = Get-ChildItem -Path "sdl2-temp" -Directory | Select-Object -First 1
          Move-Item -Path $sdlDir.FullName -Destination "SDL2"
          Remove-Item "sdl2.zip" -Force
          Remove-Item "sdl2-temp" -Recurse -Force

      - name: Build whisper.cpp with CUDA
        if: steps.cache-check.outputs.has_binaries != 'true'
        run: |
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4"
          $env:CUDA_PATH = $cudaPath
          $env:CudaToolkitDir = $cudaPath
          cd whisper-src
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DGGML_CUDA=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DWHISPER_SDL2=ON `
            -DSDL2_DIR="${{ github.workspace }}/SDL2/cmake" `
            -DCUDAToolkit_ROOT="$cudaPath" `
            -DCMAKE_CUDA_COMPILER="$cudaPath\bin\nvcc.exe"
          cmake --build . --config Release

      - name: Collect whisper binaries
        if: steps.cache-check.outputs.has_binaries != 'true'
        run: |
          New-Item -ItemType Directory -Force -Path "whisper-bin"
          $binDir = "whisper-src/build/bin/Release"
          Copy-Item "$binDir/whisper-cli.exe" "whisper-bin/"
          Copy-Item "$binDir/whisper-stream.exe" "whisper-bin/"
          Copy-Item "$binDir/whisper.dll" "whisper-bin/"
          Copy-Item "$binDir/ggml.dll" "whisper-bin/"
          Copy-Item "$binDir/ggml-base.dll" "whisper-bin/"
          Copy-Item "$binDir/ggml-cpu.dll" "whisper-bin/"
          Copy-Item "$binDir/ggml-cuda.dll" "whisper-bin/"
          Copy-Item "${{ github.workspace }}/SDL2/lib/x64/SDL2.dll" "whisper-bin/"
          # Bundle CUDA runtime DLLs so users don't need CUDA toolkit installed
          $cudaBin = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\bin"
          Copy-Item "$cudaBin/cublas64_12.dll" "whisper-bin/"
          Copy-Item "$cudaBin/cublasLt64_12.dll" "whisper-bin/"
          Copy-Item "$cudaBin/cudart64_12.dll" "whisper-bin/"
          Write-Host "Whisper binaries:"
          Get-ChildItem "whisper-bin"

      - name: Write component versions
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $json = @{ app = $version; whisper = "1.8.4-cuda12.4-v2" } | ConvertTo-Json
          Set-Content -Path "TranscriptionTools/bin/Publish/component-versions.json" -Value $json

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        shell: pwsh
        run: |
          $env:APP_VERSION = "${{ github.ref_name }}".TrimStart("v")
          iscc setup.iss

      - name: Create Zips and Manifest
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $whisperVersion = "1.8.4-cuda12.4-v2"

          # App-only zip (everything except whisper/ subdir)
          $appStage = "app-stage"
          New-Item -ItemType Directory -Force -Path $appStage
          Get-ChildItem "TranscriptionTools/bin/Publish" -Exclude "whisper" | Copy-Item -Destination $appStage -Recurse -Force
          Compress-Archive -Path "$appStage/*" -DestinationPath "Output/TranscriptionTools_App_${{ github.ref_name }}.zip"

          # Whisper-only zip
          Compress-Archive -Path whisper-bin/* -DestinationPath "Output/TranscriptionTools_Whisper_${{ github.ref_name }}.zip"

          # Manifest
          $manifest = @{
            app = $version
            whisper = $whisperVersion
            files = @{
              app = "TranscriptionTools_App_${{ github.ref_name }}.zip"
              whisper = "TranscriptionTools_Whisper_${{ github.ref_name }}.zip"
              installer = "TranscriptionTools_Setup_${version}.exe"
            }
          } | ConvertTo-Json
          Set-Content -Path "Output/manifest.json" -Value $manifest
          Write-Host "Manifest:"
          Write-Host $manifest

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Output/TranscriptionTools_Setup_*.exe
            Output/TranscriptionTools_App_${{ github.ref_name }}.zip
            Output/TranscriptionTools_Whisper_${{ github.ref_name }}.zip
            Output/manifest.json
