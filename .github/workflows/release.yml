name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish TranscriptionTools/TranscriptionTools.vbproj -c Release -o TranscriptionTools/bin/Publish

      - name: Download whisper.cpp CUDA binaries
        shell: pwsh
        run: |
          gh release download v1.8.4 -R ggml-org/whisper.cpp -p "whisper-cublas-12.4.0-bin-x64.zip" -D .
          Expand-Archive -Path "whisper-cublas-12.4.0-bin-x64.zip" -DestinationPath "whisper-extract"
          New-Item -ItemType Directory -Force -Path "whisper-bin"
          # Copy only the files we need
          $src = "whisper-extract/Release"
          Copy-Item "$src/whisper-cli.exe" "whisper-bin/"
          Copy-Item "$src/whisper.dll" "whisper-bin/"
          Copy-Item "$src/ggml.dll" "whisper-bin/"
          Copy-Item "$src/ggml-base.dll" "whisper-bin/"
          Copy-Item "$src/ggml-cpu.dll" "whisper-bin/"
          Copy-Item "$src/ggml-cuda.dll" "whisper-bin/"
          Copy-Item "$src/cublas64_12.dll" "whisper-bin/"
          Copy-Item "$src/cublasLt64_12.dll" "whisper-bin/"
          Copy-Item "$src/cudart64_12.dll" "whisper-bin/"
          Write-Host "Whisper binaries:"
          Get-ChildItem "whisper-bin"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Write component versions
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $json = @{ app = $version; whisper = "1.8.4-cuda12.4-v2" } | ConvertTo-Json
          Set-Content -Path "TranscriptionTools/bin/Publish/component-versions.json" -Value $json

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        shell: pwsh
        run: |
          $env:APP_VERSION = "${{ github.ref_name }}".TrimStart("v")
          iscc setup.iss

      - name: Create Zips and Manifest
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $whisperVersion = "1.8.4-cuda12.4-v2"

          # App-only zip (everything except whisper/ subdir)
          $appStage = "app-stage"
          New-Item -ItemType Directory -Force -Path $appStage
          Get-ChildItem "TranscriptionTools/bin/Publish" -Exclude "whisper" | Copy-Item -Destination $appStage -Recurse -Force
          Compress-Archive -Path "$appStage/*" -DestinationPath "Output/TranscriptionTools_App_${{ github.ref_name }}.zip"

          # Whisper-only zip
          Compress-Archive -Path whisper-bin/* -DestinationPath "Output/TranscriptionTools_Whisper_${{ github.ref_name }}.zip"

          # Manifest
          $manifest = @{
            app = $version
            whisper = $whisperVersion
            files = @{
              app = "TranscriptionTools_App_${{ github.ref_name }}.zip"
              whisper = "TranscriptionTools_Whisper_${{ github.ref_name }}.zip"
              installer = "TranscriptionTools_Setup_${version}.exe"
            }
          } | ConvertTo-Json
          Set-Content -Path "Output/manifest.json" -Value $manifest
          Write-Host "Manifest:"
          Write-Host $manifest

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Output/TranscriptionTools_Setup_*.exe
            Output/TranscriptionTools_App_${{ github.ref_name }}.zip
            Output/TranscriptionTools_Whisper_${{ github.ref_name }}.zip
            Output/manifest.json
