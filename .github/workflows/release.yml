name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish TranscriptionTools/TranscriptionTools.vbproj -c Release -o TranscriptionTools/bin/Publish

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        run: iscc setup.iss

      - name: Create Zip
        run: Compress-Archive -Path TranscriptionTools/bin/Publish/* -DestinationPath "Output/TranscriptionTools_${{ github.ref_name }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Output/TranscriptionTools_Setup_*.exe
            Output/TranscriptionTools_${{ github.ref_name }}.zip
